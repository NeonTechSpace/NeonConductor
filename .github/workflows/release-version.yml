name: Release Version

on:
  pull_request:
    types:
      - closed
    branches:
      - main

concurrency:
  group: release-version-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  version:
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      !startsWith(github.event.pull_request.head.ref, 'release-bot/') &&
      !startsWith(github.event.pull_request.head.ref, 'release-sync/')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Node
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: 24.13.1

      - name: Create GitHub App token
        id: app_token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Prepare stable release payload
        id: prepare
        shell: bash
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          GITHUB_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          set -euo pipefail
          git fetch --tags --force
          node .github/scripts/prepare-stable-release.mjs

      - name: Skip when no stable release is due
        if: steps.prepare.outputs.should_release != 'true'
        run: echo "No releasable PRs were found since the last stable tag."

      - name: Create release PR
        if: steps.prepare.outputs.should_release == 'true'
        id: release_pr
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676
        with:
          token: ${{ steps.app_token.outputs.token }}
          commit-message: "release(stable): v${{ steps.prepare.outputs.version }}"
          title: "release(stable): v${{ steps.prepare.outputs.version }}"
          body: ${{ steps.prepare.outputs.pr_body }}
          labels: |
            ignore-for-release
          branch: "release-bot/main"
          base: "main"
          delete-branch: true
          add-paths: |
            Project/package.json
            Project/CHANGELOG.md

      - name: Enable auto-merge for release PR
        if: steps.release_pr.outputs.pull-request-number != ''
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        env:
          RELEASE_PR_NUMBER: ${{ steps.release_pr.outputs.pull-request-number }}
        with:
          github-token: ${{ steps.app_token.outputs.token }}
          script: |
            const prNumber = Number(process.env.RELEASE_PR_NUMBER || "0");
            if (!Number.isInteger(prNumber) || prNumber <= 0) {
              core.info("No release PR number detected; skipping auto-merge enablement.");
              return;
            }

            const { owner, repo } = context.repo;
            const pr = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber,
            });
            const mergeImmediately = async () => {
              try {
                await github.rest.pulls.merge({
                  owner,
                  repo,
                  pull_number: prNumber,
                  merge_method: "squash",
                });
                core.info(`Merged release PR #${prNumber} with SQUASH.`);
              } catch (mergeError) {
                const mergeDetail = mergeError instanceof Error ? mergeError.message : String(mergeError);
                const lower = mergeDetail.toLowerCase();
                if (lower.includes("already merged")) {
                  core.info(`Release PR #${prNumber} is already merged.`);
                  return;
                }
                throw mergeError;
              }
            };

            if (pr.data.merged) {
              core.info(`Release PR #${prNumber} is already merged.`);
              return;
            }
            if (pr.data.auto_merge) {
              core.info(`Auto-merge is already enabled for release PR #${prNumber}.`);
              return;
            }
            if (pr.data.mergeable_state === "clean") {
              core.info(`Release PR #${prNumber} is already mergeable; merging immediately with SQUASH.`);
              await mergeImmediately();
              return;
            }

            const mutation = `
              mutation EnableAutoMerge($pullRequestId: ID!) {
                enablePullRequestAutoMerge(input: { pullRequestId: $pullRequestId, mergeMethod: SQUASH }) {
                  pullRequest {
                    number
                  }
                }
              }
            `;

            try {
              await github.graphql(mutation, { pullRequestId: pr.data.node_id });
              core.info(`Enabled auto-merge (SQUASH) for release PR #${prNumber}.`);
            } catch (error) {
              const detail = error instanceof Error ? error.message : String(error);
              if (detail.toLowerCase().includes("clean status")) {
                core.info(`Release PR #${prNumber} is already mergeable; merging immediately with SQUASH.`);
                await mergeImmediately();
                return;
              }
              core.setFailed(
                `Unable to enable auto-merge for release PR #${prNumber}. Ensure repository auto-merge is enabled and branch protection permits bot auto-merge. Details: ${detail}`
              );
            }
